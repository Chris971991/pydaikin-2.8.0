name: Create new release
on:
  push:
    tags:
      - 'v*'
  # Fallback: fork event-triggers may be gated until workflows are enabled
  # in the web UI Actions tab — dispatch with the tag as ref:
  #   gh workflow run release.yml --ref vX.Y.Z
  workflow_dispatch:

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version-file: 'pyproject.toml' # Read python version from a file pyproject.toml
    - name: Verify tag matches pyproject version
      run: |
        PYPROJECT_VERSION="v$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
        if [ "$PYPROJECT_VERSION" != "$GITHUB_REF_NAME" ]; then
          echo "::error::Tag $GITHUB_REF_NAME does not match pyproject.toml version $PYPROJECT_VERSION — bump pyproject.toml before tagging."
          exit 1
        fi
    - name: Install dependencies
      run: |
        pip install build --user
    - name: Build a binary wheel and a source tarball
      run: |
        python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload them to GitHub Release
    needs:
    - build
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v3.0.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
        CURRENT_VERSION: ${{ github.ref_name }}
      run: >-
        gh release create
        "$CURRENT_VERSION"
        --repo '${{ github.repository }}'
        --generate-notes
    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
        CURRENT_VERSION: ${{ github.ref_name }}
      # Upload to GitHub Release using the `gh` CLI.
      # `dist/` contains the built packages, and the
      # sigstore-produced signatures and certificates.
      run: >-
        gh release upload
        "$CURRENT_VERSION"
        dist/**
        --repo '${{ github.repository }}'
